# Nginx configuration for Verarta Test Chain
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

# ──────────────────────────────────────────────────────────────
# Test Chain API
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name test-chain.verarta.com;

    ssl_certificate     /etc/letsencrypt/live/verarta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verarta.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # CORS preflight for browser requests (eosjs, explorer)
        # Nodeos sets Access-Control-Allow-Origin itself, so we hide it
        # and manage all CORS headers from nginx to avoid duplicates.
        proxy_hide_header 'Access-Control-Allow-Origin';

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;

        proxy_pass http://127.0.0.1:18888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ──────────────────────────────────────────────────────────────
# Test Chain — Hyperion API
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name test-hyperion.verarta.com;

    ssl_certificate     /etc/letsencrypt/live/verarta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verarta.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:17000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO upgrade for Hyperion streaming (port 7001, path=/stream)
    location /stream {
        proxy_pass http://127.0.0.1:17001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ──────────────────────────────────────────────────────────────
# Test Chain — Block Explorer (custom static site)
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name test-explorer.verarta.com;

    ssl_certificate     /etc/letsencrypt/live/verarta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verarta.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/verarta/app/blockchain-test/explorer;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# ──────────────────────────────────────────────────────────────
# Test Chain — Pace Controller Dashboard
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name test-pace.verarta.com;

    ssl_certificate     /etc/letsencrypt/live/verarta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verarta.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:13100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ──────────────────────────────────────────────────────────────
# HTTP → HTTPS Redirect (test chain subdomains)
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name test-chain.verarta.com test-hyperion.verarta.com
                test-explorer.verarta.com test-pace.verarta.com;
    return 301 https://$host$request_uri;
}
