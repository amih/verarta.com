# Test Chain — Producer 4 Configuration (Non-producing Full Node)

# Plugins
plugin = eosio::chain_api_plugin
plugin = eosio::producer_plugin
plugin = eosio::producer_api_plugin
plugin = eosio::net_plugin

# Producer settings
producer-name = producer4
signature-provider = EOS67cJXZnguoN7bGZhKFBo2D2zRhdSXtJXXpYPEnSdPDJpC9UGs2=KEY:5JGpUscHZqkoWeoVVUsE7bbDJBmrnFF7HTRBs2BhsVA52FVsu4R
enable-stale-production = true

# HTTP API
http-server-address = 0.0.0.0:8888
access-control-allow-origin = *
http-validate-host = false
verbose-http-errors = true

# P2P Network
p2p-listen-endpoint = 0.0.0.0:9876
p2p-peer-address = test-producer1:9876
p2p-peer-address = test-producer2:9876
p2p-peer-address = test-producer3:9876
p2p-peer-address = test-history:9876

# P2P keep-alive for slow block production (60s gaps)
connection-cleanup-period = 120

# Performance
chain-state-db-size-mb = 1024
max-transaction-time = 500

# Logging
contracts-console = true

